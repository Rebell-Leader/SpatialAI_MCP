version: '3.8'

services:
  openproblems-mcp-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openproblems-spatial-mcp-demo
    restart: unless-stopped

    # Environment variables can be loaded from a .env file
    # environment:
    #   - OPENAI_API_KEY=${OPENAI_API_KEY}
    #   - MIXEDBREAD_API_KEY=${MIXEDBREAD_API_KEY}

    # Map the Gradio port
    ports:
      - "7860:7860"

    # Volumes for data persistence and Docker socket access
    volumes:
      - ../data:/app/data:rw
      - ../work:/app/work:rw
      - ../logs:/app/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Network configuration
    networks:
      - openproblems-network

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 2G
          cpus: '1.0'

    # Health check to ensure the Gradio app is running
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

# Networks
networks:
  openproblems-network:
    driver: bridge
    name: openproblems-spatial-network